data:
  raw_dir: data/raw/ptb-xl
  processed_dir: data/processed
  sampling_rate: 100
  label_scheme: superdiagnostic
  min_likelihood: 100
  train_folds: [1, 2, 3, 4, 5, 6, 7, 8]
  val_folds: [9]
  test_folds: [10]

augmentation:
  enabled: true
  gaussian_noise_std: 0.01
  lead_dropout_prob: 0.2
  time_shift_max: 50

model:
  name: inception_time_attention
  in_channels: 12
  num_classes: 5
  num_inception_blocks: 3
  num_filters: 32
  bottleneck_size: 32
  use_residual: true
  attention_hidden: 64
  classifier_dropout: 0.3

training:
  batch_size: 64
  num_epochs: 100
  learning_rate: 1.0e-3
  weight_decay: 5.0e-4
  lr_scheduler: cosine
  early_stopping_patience: 15
  mixed_precision: true
  num_workers: 4
  seed: 42
  checkpoint_dir: checkpoints/

loss:
  label_smoothing: 0.05
  use_class_weights: true

logging:
  level: INFO
  wandb_project: arrhythmia-classifier
  log_every_n_steps: 50

export:
  onnx_path: checkpoints/model.onnx
  opset_version: 17
