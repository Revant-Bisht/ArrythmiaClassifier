data:
  raw_dir: data/raw/ptb-xl
  processed_dir: data/processed
  sampling_rate: 100          # use 100 Hz (PTB-XL provides both 100 and 500 Hz)
  label_scheme: superdiagnostic  # 5-class: NORM, MI, STTC, CD, HYP
  train_folds: [1, 2, 3, 4, 5, 6, 7, 8]
  val_folds: [9]
  test_folds: [10]

model:
  name: inception_time_attention
  in_channels: 12             # 12 ECG leads
  num_classes: 5
  num_inception_blocks: 3
  num_filters: 32             # filters per inception branch
  bottleneck_size: 32
  use_residual: true
  attention_hidden: 64

training:
  batch_size: 64
  num_epochs: 100
  learning_rate: 1.0e-3
  weight_decay: 1.0e-4
  lr_scheduler: cosine        # cosine annealing
  early_stopping_patience: 15
  mixed_precision: true
  num_workers: 4
  seed: 42

loss:
  label_smoothing: 0.05
  use_class_weights: true     # compensate for class imbalance

logging:
  wandb_project: arrhythmia-classifier
  log_every_n_steps: 50
  checkpoint_dir: checkpoints/

export:
  onnx_path: checkpoints/model.onnx
  opset_version: 17
