data:
  raw_dir: data/raw/ptb-xl
  processed_dir: data/processed
  sampling_rate: 100            # 100 or 500 Hz (PTB-XL ships both)
  label_scheme: superdiagnostic # 5-class: NORM, MI, STTC, CD, HYP
  min_likelihood: 100           # only include codes with likelihood == 100%
  train_folds: [1, 2, 3, 4, 5, 6, 7, 8]
  val_folds: [9]
  test_folds: [10]

augmentation:
  enabled: true
  gaussian_noise_std: 0.01      # additive noise scaled to normalised signal
  lead_dropout_prob: 0.1        # zero-out a random lead with this probability
  time_shift_max: 50            # ± timesteps to randomly shift the window

model:
  name: inception_time_attention
  in_channels: 12               # 12 ECG leads
  num_classes: 5
  num_inception_blocks: 3
  num_filters: 32               # filters per inception branch (×3 kernel sizes + maxpool)
  bottleneck_size: 32           # 1x1 conv before each inception branch
  use_residual: true
  attention_hidden: 64

training:
  batch_size: 64
  num_epochs: 100
  learning_rate: 1.0e-3
  weight_decay: 1.0e-4
  lr_scheduler: cosine          # cosine annealing to zero
  early_stopping_patience: 15
  mixed_precision: true         # AMP — safe to enable on any modern GPU
  num_workers: 4
  seed: 42
  checkpoint_dir: checkpoints/

loss:
  label_smoothing: 0.05
  use_class_weights: true       # inverse-frequency weighting for class imbalance

logging:
  level: INFO                   # DEBUG | INFO | WARNING
  wandb_project: arrhythmia-classifier
  log_every_n_steps: 50

export:
  onnx_path: checkpoints/model.onnx
  opset_version: 17
